  # cname: demo.upptime.js.org
  baseUrl: /status
  logoUrl: https://github.com/MyFoodForest.png
  name: My Food Forest
  introTitle: "**My Food Forest** status — live uptime for our website, APIs, and admin portal."
  introMessage: Real-time uptime and response-time data for [My Food Forest](https://www.myfoodforest.nl) services, monitored from our [GitHub repository](https://github.com/MyFoodForest/status).
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
